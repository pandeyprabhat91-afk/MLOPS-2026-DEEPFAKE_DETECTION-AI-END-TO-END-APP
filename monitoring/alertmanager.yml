global:
  smtp_smarthost: "in-v3.mailjet.com:587"
  smtp_from: "alerts@deepscan.local"
  smtp_auth_username: "6fd4e25967f51352b10c63f22cb3461b"
  smtp_auth_password: "6fd4e25967f51352b10c63f22cb3461b"
  smtp_require_tls: true
  resolve_timeout: 5m

templates:
  - /etc/alertmanager/templates/*.tmpl

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: info-receiver

  routes:
    - match:
        severity: critical
      receiver: critical-receiver
      repeat_interval: 15m
      continue: false

    - match:
        severity: error
      receiver: error-receiver
      repeat_interval: 30m
      continue: false

    - match:
        severity: warning
      receiver: warning-receiver
      repeat_interval: 1h
      continue: false

    - match:
        severity: info
      receiver: info-receiver
      repeat_interval: 6h
      continue: false

inhibit_rules:
  # Suppress warning if critical already firing for same alertname
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]
  # Suppress info if error/critical firing
  - source_match_re:
      severity: "critical|error"
    target_match:
      severity: info
    equal: ["alertname"]

receivers:
  - name: critical-receiver
    email_configs:
      - to: "pandeyprabhat91@gmail.com"
        send_resolved: true
        headers:
          Subject: "[CRITICAL] DeepScan Alert: {{ .GroupLabels.alertname }}"
        html: |
          <h2 style="color:#cc0000;">CRITICAL ALERT</h2>
          {{ range .Alerts }}
          <p><b>Alert:</b> {{ .Labels.alertname }}<br>
          <b>Summary:</b> {{ .Annotations.summary }}<br>
          <b>Description:</b> {{ .Annotations.description }}<br>
          <b>Started:</b> {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}<br>
          <b>Status:</b> {{ .Status }}</p>
          <hr>
          {{ end }}

  - name: error-receiver
    email_configs:
      - to: "pandeyprabhat91@gmail.com"
        send_resolved: true
        headers:
          Subject: "[ERROR] DeepScan Alert: {{ .GroupLabels.alertname }}"
        html: |
          <h2 style="color:#ff6600;">ERROR ALERT</h2>
          {{ range .Alerts }}
          <p><b>Alert:</b> {{ .Labels.alertname }}<br>
          <b>Summary:</b> {{ .Annotations.summary }}<br>
          <b>Description:</b> {{ .Annotations.description }}<br>
          <b>Started:</b> {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}<br>
          <b>Status:</b> {{ .Status }}</p>
          <hr>
          {{ end }}

  - name: warning-receiver
    email_configs:
      - to: "pandeyprabhat91@gmail.com"
        send_resolved: true
        headers:
          Subject: "[WARNING] DeepScan Alert: {{ .GroupLabels.alertname }}"
        html: |
          <h2 style="color:#ffaa00;">WARNING ALERT</h2>
          {{ range .Alerts }}
          <p><b>Alert:</b> {{ .Labels.alertname }}<br>
          <b>Summary:</b> {{ .Annotations.summary }}<br>
          <b>Description:</b> {{ .Annotations.description }}<br>
          <b>Started:</b> {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}<br>
          <b>Status:</b> {{ .Status }}</p>
          <hr>
          {{ end }}

  - name: info-receiver
    email_configs:
      - to: "pandeyprabhat91@gmail.com"
        send_resolved: false
        headers:
          Subject: "[INFO] DeepScan Alert: {{ .GroupLabels.alertname }}"
        html: |
          <h2 style="color:#0066cc;">INFO ALERT</h2>
          {{ range .Alerts }}
          <p><b>Alert:</b> {{ .Labels.alertname }}<br>
          <b>Summary:</b> {{ .Annotations.summary }}<br>
          <b>Description:</b> {{ .Annotations.description }}<br>
          <b>Started:</b> {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}</p>
          <hr>
          {{ end }}
